# CI ฝึก DevOps แบบไม่ต้องเช่า server: build .NET + frontend + Docker images
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and build solution
        run: dotnet build "HR-Lite.sln" -c Release

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm run build:docker

  docker:
    name: Docker build (no deploy)
    runs-on: ubuntu-latest
    needs: [dotnet, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: NexusCore.Api/Dockerfile
          push: false
          tags: nexuscore-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: false
          tags: nexuscore-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: nexuscore-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
