# Docker stack — uses Production env so gateway talks to backend-service (not localhost)
services:
  backend-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5100
      - Jwt__Key=DockerLocalPracticeKey-32CharsMinForHmacSha256!
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/nexuscore.db
    volumes:
      - backend-data:/app/data
    # Internal only — traffic enters via gateway-service

  gateway-service:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "5000:5000"
    depends_on:
      - backend-service

  frontend-service:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${DOCKER_FRONTEND_PORT:-8081}:80" # default 8081 — หลีกเลี่ยงชน :8080 กับ container อื่น
    depends_on:
      - gateway-service

volumes:
  backend-data:
